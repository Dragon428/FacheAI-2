<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #0a0a0a;
  --sidebar: #111111;
  --surface: #1a1a1a;
  --surface2: #222222;
  --border: #2a2a2a;
  --border2: #333333;
  --text: #ececec;
  --text2: #888;
  --text3: #555;
  --accent: #10b981;
  --accent-dim: rgba(16,185,129,0.1);
  --accent-glow: rgba(16,185,129,0.22);
}
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Geist', system-ui, sans-serif; font-size: 15px; line-height: 1.6; overflow: hidden; }
.app { display: flex; height: 100vh; }

/* SIDEBAR */
.sidebar { width: 256px; min-width: 256px; background: var(--sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 14px 10px; gap: 4px; }
.sidebar-logo { display: flex; align-items: center; gap: 9px; padding: 8px 10px 14px; border-bottom: 1px solid var(--border); margin-bottom: 8px; }
.logo-mark { width: 30px; height: 30px; background: var(--accent); border-radius: 7px; display: flex; align-items: center; justify-content: center; font-size: 15px; flex-shrink: 0; box-shadow: 0 0 14px var(--accent-glow); }
.logo-name { font-family: 'Instrument Serif', serif; font-size: 1.1rem; color: var(--text); }
.new-btn { display: flex; align-items: center; gap: 8px; padding: 8px 12px; border-radius: 8px; border: 1px solid var(--border2); background: transparent; color: var(--text2); cursor: pointer; font-family: 'Geist', sans-serif; font-size: 0.82rem; font-weight: 500; transition: all 0.15s; width: 100%; }
.new-btn:hover { background: var(--surface); color: var(--text); }
.sec-label { font-size: 0.68rem; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text3); padding: 10px 12px 4px; }
.hist-item { padding: 7px 12px; border-radius: 6px; font-size: 0.81rem; color: var(--text2); cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; transition: all 0.12s; }
.hist-item:hover { background: var(--surface); color: var(--text); }
.hist-item.active { background: var(--surface); color: var(--text); }
.sidebar-footer { margin-top: auto; border-top: 1px solid var(--border); padding-top: 10px; }
.user-card { display: flex; align-items: center; gap: 9px; padding: 7px 10px; border-radius: 7px; cursor: pointer; transition: background 0.12s; }
.user-card:hover { background: var(--surface); }
.uavatar { width: 28px; height: 28px; background: linear-gradient(135deg,#6366f1,#8b5cf6); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; flex-shrink: 0; }
.uname { font-size: 0.8rem; font-weight: 500; }
.uplan { font-size: 0.68rem; color: var(--accent); font-weight: 500; }

/* MAIN */
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.topbar { height: 50px; display: flex; align-items: center; justify-content: space-between; padding: 0 22px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.model-pill { display: flex; align-items: center; gap: 7px; padding: 5px 12px; border-radius: 8px; border: 1px solid var(--border2); background: transparent; color: var(--text); font-family: 'Geist', sans-serif; font-size: 0.8rem; font-weight: 500; cursor: default; }
.mdot { width: 6px; height: 6px; background: var(--accent); border-radius: 50%; box-shadow: 0 0 5px var(--accent); animation: blink 2s ease-in-out infinite; }
@keyframes blink { 0%,100%{opacity:1}50%{opacity:0.35} }
.tbactions { display: flex; gap: 5px; }
.ibtn { width: 30px; height: 30px; border-radius: 7px; border: 1px solid var(--border); background: transparent; color: var(--text2); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 13px; transition: all 0.12s; }
.ibtn:hover { background: var(--surface); color: var(--text); }

/* CHAT SCROLL */
.chat-scroll { flex: 1; overflow-y: auto; }
.chat-scroll::-webkit-scrollbar { width: 4px; }
.chat-scroll::-webkit-scrollbar-track { background: transparent; }
.chat-scroll::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

/* WELCOME */
.welcome { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100%; padding: 50px 24px 30px; text-align: center; animation: fadeUp 0.45s ease; }
@keyframes fadeUp { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
.wicon { width: 68px; height: 68px; background: linear-gradient(135deg, var(--accent), #059669); border-radius: 18px; display: flex; align-items: center; justify-content: center; font-size: 32px; margin-bottom: 22px; box-shadow: 0 0 36px var(--accent-glow), 0 8px 28px rgba(0,0,0,0.45); animation: wfloat 4s ease-in-out infinite; }
@keyframes wfloat { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-7px)} }
.welcome h1 { font-family: 'Instrument Serif', serif; font-size: 2.2rem; font-weight: 400; margin-bottom: 10px; letter-spacing: -0.02em; }
.welcome h1 em { font-style: italic; color: var(--accent); }
.welcome p { color: var(--text2); font-size: 0.92rem; max-width: 400px; margin-bottom: 36px; line-height: 1.65; }
.cards { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; max-width: 540px; width: 100%; }
.card { background: var(--surface); border: 1px solid var(--border); border-radius: 11px; padding: 14px 16px; text-align: left; cursor: pointer; transition: all 0.18s; position: relative; overflow: hidden; }
.card::after { content:''; position:absolute; inset:0; background: linear-gradient(135deg, var(--accent-dim), transparent); opacity:0; transition:opacity 0.18s; }
.card:hover { border-color: rgba(16,185,129,0.32); transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.3); }
.card:hover::after { opacity:1; }
.cemoji { font-size: 1.25rem; margin-bottom: 7px; display: block; }
.ctitle { font-size: 0.82rem; font-weight: 600; color: var(--text); margin-bottom: 2px; }
.cdesc { font-size: 0.76rem; color: var(--text2); line-height: 1.4; }

/* MESSAGES */
.msgs { display: none; flex-direction: column; padding: 20px 0 6px; }
.mrow { padding: 4px 0; animation: min 0.22s ease; }
@keyframes min { from{opacity:0;transform:translateY(7px)} to{opacity:1;transform:translateY(0)} }
.minner { max-width: 700px; margin: 0 auto; padding: 0 22px; display: flex; gap: 13px; align-items: flex-start; }
.minner.user-inner { flex-direction: row-reverse; }
.mavatar { width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 13px; margin-top: 3px; }
.mavatar.ai { background: var(--accent); box-shadow: 0 0 10px var(--accent-glow); }
.mavatar.user { background: linear-gradient(135deg,#6366f1,#8b5cf6); }
.mbody { flex: 1; padding-top: 2px; }
.mname { font-size: 0.75rem; font-weight: 600; color: var(--text2); margin-bottom: 5px; }
.mname.ain { color: var(--accent); }
.user-inner .mname { text-align: right; }
.mtext { font-size: 0.9rem; line-height: 1.72; color: var(--text); word-break: break-word; overflow-wrap: break-word; }
.user-inner .mtext { background: var(--surface); border: 1px solid var(--border2); border-radius: 12px; padding: 10px 14px; display: inline-block; max-width: 100%; }
.mtext p+p { margin-top: 9px; }
.mtext strong { font-weight: 600; }
.mtext em { color: #a78bfa; }
.mtext code { background: var(--surface2); border: 1px solid var(--border2); padding: 2px 6px; border-radius: 4px; font-family: 'Courier New', monospace; font-size: 0.84em; color: var(--accent); }
.mtext ul, .mtext ol { padding-left: 20px; margin: 7px 0; }
.mtext li { margin: 3px 0; }
.mtext h3 { font-size: 0.97rem; font-weight: 600; margin: 12px 0 5px; }
.mhr { max-width: 700px; margin: 2px auto; padding: 0 22px; }
.mhr hr { border: none; border-top: 1px solid var(--border); }
.tdots { display: flex; align-items: center; gap: 4px; padding: 3px 0; }
.tdot { width: 5px; height: 5px; background: var(--accent); border-radius: 50%; animation: td 1.2s ease-in-out infinite; }
.tdot:nth-child(2){animation-delay:.2s} .tdot:nth-child(3){animation-delay:.4s}
@keyframes td { 0%,80%,100%{transform:translateY(0);opacity:.3} 40%{transform:translateY(-5px);opacity:1} }

/* INPUT */
.input-section { padding: 10px 22px 18px; flex-shrink: 0; }
.ibox { max-width: 700px; margin: 0 auto; background: var(--surface); border: 1px solid var(--border2); border-radius: 13px; transition: border-color 0.18s, box-shadow 0.18s; }
.ibox:focus-within { border-color: rgba(16,185,129,0.38); box-shadow: 0 0 0 3px rgba(16,185,129,0.06); }
.itop { display: flex; align-items: flex-end; padding: 11px 13px 9px; gap: 9px; }
#inp { flex:1; background:transparent; border:none; outline:none; color:var(--text); font-family:'Geist',sans-serif; font-size:0.9rem; resize:none; min-height:22px; max-height:180px; line-height:1.55; padding:2px 0; }
#inp::placeholder { color:var(--text3); }
#inp::-webkit-scrollbar{width:3px}
.sbtn { width:32px;height:32px;background:var(--accent);border:none;border-radius:7px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;box-shadow:0 2px 7px var(--accent-glow); }
.sbtn:hover{filter:brightness(1.1);transform:scale(1.06)} .sbtn:active{transform:scale(0.94)} .sbtn:disabled{opacity:.38;cursor:not-allowed;transform:none}
.sbtn svg{width:14px;height:14px;fill:white}
.ibot { display:flex;align-items:center;justify-content:space-between;padding:0 13px 9px; }
.pills{display:flex;gap:5px}
.pill{display:flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text2);font-family:'Geist',sans-serif;font-size:0.7rem;cursor:pointer;transition:all .12s}
.pill:hover{border-color:var(--border2);color:var(--text)}
.ihint{font-size:0.68rem;color:var(--text3)}



@media(max-width:768px){.sidebar{display:none}.welcome h1{font-size:1.7rem}.cards{grid-template-columns:1fr}.input-section{padding:8px 14px 14px}.minner{padding:0 14px}}

/* ── Language selector ─────────────────────── */
#langSelector { position:relative; display:inline-block; }
#langBtnNew {
  display:flex; align-items:center; gap:6px;
  padding:5px 11px; border-radius:8px;
  border:1px solid var(--border2); background:transparent;
  color:var(--text2); font-family:'Geist',sans-serif;
  font-size:0.78rem; font-weight:600; cursor:pointer;
  transition:all .15s;
}
#langBtnNew:hover { background:var(--surface); color:var(--text); }
#langDropdown {
  display:none; position:fixed; top:52px; right:14px;
  background:#1a1a1a; border:1px solid var(--border2);
  border-radius:10px; z-index:99999;
  min-width:158px; box-shadow:0 10px 30px rgba(0,0,0,.6);
}
#langDropdown.show { display:block; }
.lopt {
  display:flex; align-items:center; gap:10px;
  padding:11px 15px; cursor:pointer;
  font-family:'Geist',sans-serif; font-size:0.83rem;
  color:var(--text2); transition:background .12s;
}
.lopt:first-child { border-radius:10px 10px 0 0; }
.lopt:last-child  { border-radius:0 0 10px 10px; }
.lopt:hover { background:var(--surface2); color:var(--text); }
.lopt.sel { color:var(--accent); }
</style>
</head>

function rmTyping() { const t = document.getElementById('trow'); if(t) t.remove(); }

function md(t) {
  t = t
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.*?)\*/g,'<em>$1</em>')
    .replace(/`(.*?)`/g,'<code>$1</code>')
    .replace(/^### (.+)$/gm,'<h3>$1</h3>')
    .replace(/^## (.+)$/gm,'<h3>$1</h3>')
    .replace(/^- (.+)$/gm,'<li>$1</li>');
  t = t.replace(/(<li>[\s\S]*?<\/li>)/g, '<ul>$1</ul>');
  return t.split(/\n\n+/).map(p => p.trim() ? (p.startsWith('<')?p:`<p>${p.replace(/\n/g,'<br>')}</p>`) : '').join('');
}

  const m = document.getElementById('langMenu');

function applyLang() {
  const t = i18n[currentLang];
  document.getElementById('langLabel').textContent = currentLang.toUpperCase();
  document.querySelector('.new-btn').innerHTML = '<span style="font-size:16px;line-height:1">+</span> ' + t.newChat;
  document.getElementById('inp').placeholder = t.placeholder;
  const wh1 = document.querySelector('#wscreen h1');
  if (wh1) wh1.textContent = t.welcome;
  document.querySelector('.ihint').textContent = t.hint;
  const pills = document.querySelectorAll('.pill');
  if (pills[0]) pills[0].textContent = t.attach;
  if (pills[1]) pills[1].textContent = t.search;
  const curH = document.getElementById('curHist');
  if (curH && (curH.textContent === i18n['es'].curHist || curH.textContent === i18n['en'].curHist)) {
    curH.textContent = t.curHist;
  }
  document.querySelector('.uname').textContent = t.uname;
  document.querySelector('.uplan').textContent = t.uplan;
  // cards
  const ctitles = document.querySelectorAll('.ctitle');
  const cdescs = document.querySelectorAll('.cdesc');
  const ckeys = ['card1t','card2t','card3t','card4t'];
  const dkeys = ['card1d','card2d','card3d','card4d'];
  ctitles.forEach((el, i) => { if(ckeys[i]) el.textContent = t[ckeys[i]]; });
  cdescs.forEach((el, i) => { if(dkeys[i]) el.textContent = t[dkeys[i]]; });
}

async function send() {
  const t = inp.value.trim();
  if (!t || busy) return;
  busy = true; sbtn.disabled = true;
  inp.value = ''; inp.style.height = 'auto';
  if (hist.length === 0) {
    document.getElementById('curHist').textContent = t.length > 34 ? t.slice(0,34)+'…' : t;
  }
  addMsg('user', t);
  hist.push({ role:'user', content:t });
  typing();
  try {
    const r = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method:'POST',
      headers:{ 'Content-Type':'application/json', 'Authorization':'Bearer '+KEY },
      body:JSON.stringify({ model:'llama-3.3-70b-versatile', max_tokens:1024, temperature:0.82,
        messages:[{role:'system',content:SYS},...hist] })
    });
    const d = await r.json();
    rmTyping();
    if (d.error) {
      addMsg('ai','❌ Error de API: ' + (d.error.message||'Algo salió mal.'));
    } else {
      const rep = d.choices?.[0]?.message?.content || 'No pude procesar tu mensaje.';
      hist.push({ role:'assistant', content:rep });
      addMsg('ai', rep);
    }
  } catch(e) {
    rmTyping();
    addMsg('ai','😕 Error de conexión. Comprueba tu internet e inténtalo de nuevo.');
  }
  busy = false; sbtn.disabled = false; inp.focus();
}

  document.getElementById('langLabel').textContent = lang.toUpperCase();
  // active style
  ['en','es'].forEach(l => {
    const o = document.getElementById('opt-'+l);
    if(o) o.classList.toggle('sel', l === lang);
  });
  // UI texts
  const nb = document.querySelector('.new-btn');
  if(nb) nb.innerHTML = '<span style="font-size:16px;line-height:1">+</span> ' + t.newChat;
  const inp = document.getElementById('inp');
  if(inp) inp.placeholder = t.placeholder;
  const wh = document.querySelector('#wscreen h1');
  if(wh) wh.textContent = t.welcome;
  const hint = document.querySelector('.ihint');
  if(hint) hint.textContent = t.hint;
  const pills = document.querySelectorAll('.pill');
  if(pills[0]) pills[0].textContent = t.attach;
  if(pills[1]) pills[1].textContent = t.search;
  const ch = document.getElementById('curHist');
  if(ch && (ch.textContent===T.en.histDef || ch.textContent===T.es.histDef)) ch.textContent = t.histDef;
  const un = document.querySelector('.uname');
  if(un) un.textContent = t.uname;
  const up = document.querySelector('.uplan');
  if(up) up.textContent = t.uplan;
  const ct = document.querySelectorAll('.ctitle');
  const cd = document.querySelectorAll('.cdesc');
  ['c1t','c2t','c3t','c4t'].forEach((k,i)=>{ if(ct[i]) ct[i].textContent=t[k]; });
  ['c1d','c2d','c3d','c4d'].forEach((k,i)=>{ if(cd[i]) cd[i].textContent=t[k]; });
  // new chat button title
  const nc = document.getElementById('btnNewChat');
  if(nc) nc.title = t.newChat;
}

function toggleDropdown(e) {
  e.stopPropagation();
  document.getElementById('langDropdown').classList.toggle('show');
}

function pickLang(e, l) {
  e.stopPropagation();
  lang = l;
  document.getElementById('langDropdown').classList.remove('show');
  applyLang();
}

document.addEventListener('click', () => {
  const d = document.getElementById('langDropdown');
  if(d) d.classList.remove('show');
});

// Apply English on load
window.addEventListener('DOMContentLoaded', () => applyLang());

</script>
</body>
</html>
